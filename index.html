<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peigo - Credenciales</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --peigo-primary: #8C52FF;
            --peigo-secondary: #FF66C4;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at top right, rgba(140, 82, 255, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255, 102, 196, 0.15), transparent 40%);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo-img {
            display: block;
            margin: 0 auto 1.5rem auto;
            width: 120px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            object-fit: cover;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 2rem;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-badge::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
        }

        .description {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--peigo-primary), var(--peigo-secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px -10px var(--peigo-primary);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px var(--peigo-primary);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-primary:hover::after {
            left: 100%;
        }

    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="Logo Peigo" class="logo-img">
        
        <div class="status-badge">
            Estado: Recuperado
        </div>

        <h1 class="title">Credenciales Recuperadas</h1>
        <p class="description">Tus credenciales han sido recuperadas exitosamente en nuestro sistema de Web Services.</p>

        <button class="btn-primary" id="btn-mostrar" onclick="mostrarCredenciales()">
            Mostrar Credenciales
        </button>
    </div>

    <script>
        function mostrarCredenciales() {
            // Animación sutil antes de redirigir
            const btn = document.getElementById('btn-mostrar');
            btn.style.opacity = '0.8';
            btn.textContent = 'Redirigiendo...';
            
            setTimeout(() => {
                window.location.href = 'http://google.com';
            }, 300);
        }
    </script>
</body>
</html>
